<div class="flag-list">
  <div *ngFor="let flag of flags; let i = index" (click)="toggleFlag(i)">
    <app-flag-item [flag]="flag" [isExpanded]="expandedFlagIndex === i"
    [isDarkTheme]="isDarkTheme"></app-flag-item>
  </div>
</div>
